<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerca | NOI OUTLET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .search-page { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
        .search-input-wrap { display:flex; border-bottom: 2px solid #000; padding-bottom:12px; margin-bottom:48px; gap:12px; align-items:center; }
        .search-input-wrap input { flex:1; border:none; outline:none; font-size:22px; font-family:var(--font-sans); }
        .search-input-wrap i { font-size:28px; }
        .search-suggestion-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#888; margin-bottom:16px; }
        .search-tags { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:48px; }
        .search-tag { padding:8px 18px; border:1px solid #ccc; font-size:12px; letter-spacing:.5px; cursor:pointer; text-transform:uppercase; transition:all .3s; }
        .search-tag:hover { background:#000; color:#fff; border-color:#000; }
        .search-results { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
        @media(max-width:600px){.search-results{grid-template-columns:repeat(2,1fr);}}
    </style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="site-header"></div>

    <div class="search-page">
        <div class="search-input-wrap">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="searchField" placeholder="Cerca prodotti, collezioni..." autofocus>
        </div>
        <p class="search-suggestion-label">Ricerche Popolari</p>
        <div class="search-tags">
            <span class="search-tag" onclick="fillSearch('Giacca')">Giacca</span>
            <span class="search-tag" onclick="fillSearch('Cachemire')">Cachemire</span>
            <span class="search-tag" onclick="fillSearch('Scarpe')">Scarpe</span>
            <span class="search-tag" onclick="fillSearch('Profumi')">Profumi</span>
            <span class="search-tag" onclick="fillSearch('Nuovi Arrivi')">Nuovi Arrivi</span>
            <span class="search-tag" onclick="fillSearch('Accessori')">Accessori</span>
            <span class="search-tag" onclick="fillSearch('Gift')">Gift</span>
        </div>
        <div id="results" class="search-results"></div>
    </div>

    <div id="site-footer"></div>
    <script src="components.js"></script>
    <script>
        const allProducts = [
            { name:'Giacca Sartoriale', href:'ready-to-wear.html', img:'images/srv1.jpg', price:'€ 2.400' },
            { name:'Cardigan Cachemire', href:'nuovi-arrivi.html', img:'images/prod1.jpg', price:'€ 1.290' },
            { name:'Oxford Marrone', href:'scarpe.html', img:'images/prod2.jpg', price:'€ 890' },
            { name:'Fragranza Il Sottobosco', href:'profumi.html', img:'images/prod3.jpg', price:'€ 320' },
            { name:'Cravatta Seta', href:'accessori.html', img:'images/prod4.jpg', price:'€ 280' },
            { name:'Set Regalo Esclusivo', href:'regali.html', img:'images/prod5.jpg', price:'€ 490' },
        ];

        function fillSearch(q) {
            document.getElementById('searchField').value = q;
            doSearch(q);
        }

        function doSearch(q) {
            const results = document.getElementById('results');
            const filtered = q.trim() === '' ? allProducts : allProducts.filter(p =>
                p.name.toLowerCase().includes(q.toLowerCase())
            );
            if (filtered.length === 0) {
                results.innerHTML = `<p style="grid-column:1/-1;color:#888;font-size:14px;">Nessun risultato per "${q}".</p>`;
                return;
            }
            results.innerHTML = filtered.map(p => `
                <a href="${p.href}" style="display:block;text-decoration:none;color:inherit;">
                    <img src="${p.img}" alt="${p.name}" style="width:100%;aspect-ratio:3/4;object-fit:cover;margin-bottom:12px;">
                    <p style="font-size:13px;font-weight:500;">${p.name}</p>
                    <p style="font-size:12px;color:#888;margin-top:4px;">${p.price}</p>
                </a>`).join('');
        }

        document.getElementById('searchField').addEventListener('input', function() {
            doSearch(this.value);
        });

        // Show all products by default
        doSearch('');
    </script>
</body>
</html>
