<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessori | NOI OUTLET</title>
    <meta name="description" content="Cravatte, cinture, portafogli e foulard di lusso. Scopri la collezione accessori NOI OUTLET.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="site-header"></div>

    <div class="page-hero">
        <img src="images/srv2.jpg" alt="Accessori">
        <div class="page-hero-content">
            <p>Il Dettaglio Che Fa la Differenza</p>
            <h1>ACCESSORI</h1>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-bar-left">
            <button class="filter-btn active">Tutti</button>
            <button class="filter-btn">Cravatte</button>
            <button class="filter-btn">Cinture</button>
            <button class="filter-btn">Portafogli</button>
            <button class="filter-btn">Occhiali</button>
        </div>
        <div class="filter-bar-right">32 prodotti</div>
    </div>

    <div class="products-grid">
        <div class="product-item"><div class="product-item-img"><img src="images/prod1.jpg" alt="Cravatta Seta Rigata"><div class="product-item-actions"><button aria-label="Wishlist"><i class="ph ph-heart"></i></button><button aria-label="Aggiungi al carrello"><i class="ph ph-tote"></i></button></div></div><div class="product-item-info"><p class="product-item-name">Cravatta Seta Rigata</p><p class="product-item-desc">Seta 100%</p><div class="product-item-price"><span>€ 280</span></div></div></div>
        <div class="product-item"><div class="product-item-img"><img src="images/prod2.jpg" alt="Cintura Coccodrillo"><span class="product-item-badge">Esclusivo</span><div class="product-item-actions"><button aria-label="Wishlist"><i class="ph ph-heart"></i></button><button aria-label="Aggiungi al carrello"><i class="ph ph-tote"></i></button></div></div><div class="product-item-info"><p class="product-item-name">Cintura Coccodrillo</p><p class="product-item-desc">Pelle di Coccodrillo</p><div class="product-item-price"><span>€ 1.200</span></div></div></div>
        <div class="product-item"><div class="product-item-img"><img src="images/prod3.jpg" alt="Portafoglio Slim"><div class="product-item-actions"><button aria-label="Wishlist"><i class="ph ph-heart"></i></button><button aria-label="Aggiungi al carrello"><i class="ph ph-tote"></i></button></div></div><div class="product-item-info"><p class="product-item-name">Portafoglio Slim</p><p class="product-item-desc">Pelle di Vitello</p><div class="product-item-price"><span>€ 390</span></div></div></div>
        <div class="product-item"><div class="product-item-img"><img src="images/prod4.jpg" alt="Occhiali da Sole"><span class="product-item-badge sale">-15%</span><div class="product-item-actions"><button aria-label="Wishlist"><i class="ph ph-heart"></i></button><button aria-label="Aggiungi al carrello"><i class="ph ph-tote"></i></button></div></div><div class="product-item-info"><p class="product-item-name">Occhiali da Sole</p><p class="product-item-desc">Acetato e Metallo</p><div class="product-item-price"><span class="price-original">€ 560</span><span class="price-sale">€ 476</span></div></div></div>
    </div>

    <div id="site-footer"></div>
    <script src="components.js"></script>
    <script>document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');});});</script>
</body>
</html>
